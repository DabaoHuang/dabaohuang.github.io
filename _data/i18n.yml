    newer: Newer
    related: Related Posts
  projects:
    title: Projects
    eyebrow: Projects & Collaboration
    heading: Full-stack engineer available for web development and DevOps projects.
    intro: I am open to discussing many types of systems, with a stronger focus on web development, admin tools, workflow automation, cloud operations, and maintainable delivery.
    web_title: Web Development
    web_text: Frontend and backend features, site architecture, admin panels, documentation sites, and technical blogs.
    fullstack_title: Full-stack Delivery
    fullstack_text: Requirement breakdown, data flows, APIs, forms, import/export flows, and recurring task automation.
    devops_title: DevOps & Operations
    devops_text: AWS, Linux, deployment workflows, backups, monitoring, CI/CD, and operational improvements.
    needs_title: Good Fits
    needs:
      - Company websites, technical blogs, documentation sites, and portfolio sites
      - Admin systems, forms, import/export flows, and reporting workflows
      - Existing site maintenance, feature expansion, page updates, performance, and SEO improvements
      - AWS, Linux, deployment, backup, monitoring, CI/CD, and operations work
      - Turning repeated manual work into trackable internal tools
    process_title: Collaboration Process
    process:
      - title: 1. Initial discussion
        text: Clarify the problem, expected outcome, timeline, and rough budget. If the scope is unclear, we can shape it first.
      - title: 2. Scope alignment
        text: Define features, pages, data sources, deployment, deliverables, and acceptance criteria before implementation starts.
      - title: 3. Staged delivery
        text: Split work into reviewable milestones. Small changes can move quickly; larger systems start with a focused MVP.
      - title: 4. Launch and handoff
        text: Support deployment, basic testing, documentation, and handoff notes so the project can be maintained after launch.
    contact_brief_title: Helpful Context
    contact_brief:
      - Current website or system URL, if one exists
      - The problem you want to solve and the desired end state
      - Timeline, rough budget, and any existing design or spec
      - Which parts you need help with: frontend, backend, deployment, operations, or planning
    contact_title: Contact
    contact_text: For web development, internal tools, or DevOps-related projects, contact me by email, GitHub, or Facebook.
  seo:
    fallback_description: "Technical notes by Dabao Huang on web development, DevOps, Linux, AWS, Git, and full-stack engineering."

