  projects:
    title: プロジェクト
    eyebrow: Projects & Collaboration
    heading: Web 開発と DevOps 関連のプロジェクトを相談できます。
    intro: 幅広いシステムについて相談可能ですが、特に Web 開発、管理画面、業務フロー自動化、クラウド運用、保守しやすい構成づくりを得意としています。
    web_title: Web Development
    web_text: フロントエンド・バックエンド機能、サイト設計、管理画面、ドキュメントサイト、技術ブログ。
    fullstack_title: Full-stack Delivery
    fullstack_text: 要件整理、データフロー、API、フォーム、インポート・エクスポート、定型作業の自動化。
    devops_title: DevOps & Operations
    devops_text: AWS、Linux、デプロイ、バックアップ、監視、CI/CD、既存環境の改善。
    needs_title: 相談しやすい内容
    needs:
      - 会社サイト、技術ブログ、ドキュメントサイト、ポートフォリオサイト
      - 管理画面、フォーム、データ入出力、レポート作成フロー
      - 既存サイトの保守、機能追加、ページ修正、パフォーマンスと SEO 改善
      - AWS、Linux、デプロイ、バックアップ、監視、CI/CD、運用改善
      - 手作業の多い業務を、追跡・引き継ぎしやすい内部ツールにすること
    process_title: 進め方
    process:
      - title: 1. 初回相談
        text: 現在の課題、目指す状態、スケジュール、予算感を確認します。要件が曖昧な場合は整理から始めます。
      - title: 2. 範囲の確認
        text: 機能、ページ、データ、デプロイ方法、納品物、確認方法を実装前にそろえます。
      - title: 3. 段階的な納品
        text: 確認しやすい単位に分けて進めます。小さな修正は素早く、大きなシステムは MVP から始めます。
      - title: 4. 公開と引き継ぎ
        text: デプロイ、基本テスト、ドキュメント、操作メモまで整理し、公開後も保守しやすい状態にします。
    contact_brief_title: 連絡時にあると助かる情報
    contact_brief:
      - 既存のサイトやシステム URL
      - 解決したい問題と、完了後に期待する状態
      - 希望スケジュール、予算感、既存デザインや仕様の有無
      - 相談したい範囲：フロントエンド、バックエンド、デプロイ、運用、設計など
    contact_title: Contact
    contact_text: Web 開発、内部ツール、DevOps 関連の相談は Email、GitHub、Facebook から連絡できます。
  seo:
    fallback_description: "Dabao Huang による Web 開発、DevOps、Linux、AWS、Git、フルスタック開発の技術メモ。"
