    title: Projects
    eyebrow: Projects & Collaboration
    heading: 全端工程師，可承接網頁開發與 DevOps 相關專案。
    intro: 我什麼類型的系統都願意討論，但更專精於網頁開發、後台工具、流程自動化與雲端維運。這裡會逐步整理做過的網站、內部工具、資料流程與 DevOps 經驗。
    web_title: Web Development
    web_text: 前後端功能、網站架構、管理後台、文件站與技術部落格。
    fullstack_title: Full-stack Delivery
    fullstack_text: 需求拆解、資料流程、API、表單、匯入匯出與例行工作自動化。
    devops_title: DevOps & Operations
    devops_text: AWS、Linux、部署流程、備份、監控、CI/CD 與既有環境改善。
    needs_title: 適合討論的需求
    needs:
      - 公司形象網站、技術部落格、文件站、作品集網站
      - 後台管理系統、表單流程、資料匯入匯出、報表整理
      - 既有網站維護、功能擴充、頁面調整、效能與 SEO 改善
      - AWS、Linux、部署流程、備份、監控、CI/CD 與維運改善
      - 把重複的人工流程整理成可追蹤、可交接的內部工具
    process_title: 合作方式
    process:
      - title: 1. 初步討論
        text: 先確認目前遇到的問題、希望完成的結果、時程與預算範圍。如果需求還不明確，也可以先一起把範圍整理出來。
      - title: 2. 範圍確認
        text: 把功能、頁面、資料來源、部署方式、交付內容與驗收方式列清楚，避免做到一半才發現雙方期待不同。
      - title: 3. 分階段交付
        text: 依照專案大小拆成可檢查的階段，定期同步進度。小型修改可以快速處理，較大的系統會先切 MVP。
      - title: 4. 上線與交接
        text: 協助部署、基本測試、文件整理與必要的操作說明，讓專案不是只有能跑，而是之後也能維護。
    contact_brief_title: 聯絡時可以附上
    contact_brief:
      - 目前網站或系統網址，如果已經存在的話
      - 想解決的問題，以及希望完成後變成什麼狀態
      - 預計時程、預算範圍與是否有既有設計或規格
      - 需要我負責的部分：前端、後端、部署、維運或整體規劃
    contact_title: Contact
    contact_text: 如果有網站、內部工具或 DevOps 相關需求，可以透過 Email、GitHub 或 Facebook 聯絡我。
  seo:
    fallback_description: "Dabao Huang 的技術筆記，記錄 Web Development、DevOps、Linux、AWS、Git 與全端開發實務。"

